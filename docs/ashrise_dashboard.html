const TAG_COLORS = ['#7dd3fc','#a5b4fc','#f472b6','#4ade80','#fbbf24','#f87171','#34d399','#c084fc','#fb923c'];
const hashToColor = (tag) => {
  let h = 0; for (let i = 0; i < tag.length; i++) h = ((h<<5)-h+tag.charCodeAt(i))|0;
  return TAG_COLORS[Math.abs(h) % TAG_COLORS.length];
};
const arrowColorAt = (t) => {
  const lerp = (a, b, p) => {
    const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
    const ar = (ah>>16)&255, ag = (ah>>8)&255, aB = ah&255;
    const br = (bh>>16)&255, bg = (bh>>8)&255, bB = bh&255;
    const r = Math.round(ar + (br-ar)*p), g = Math.round(ag + (bg-ag)*p), bb = Math.round(aB + (bB-aB)*p);
    return `#${((r<<16)|(g<<8)|bb).toString(16).padStart(6,'0')}`;
  };
  if (t < 0.5) return lerp(T.arrStart, T.arrMid, t*2);
  return lerp(T.arrMid, T.arrEnd, (t-0.5)*2);
};

// ═══════════════════════════════════════════════════════════
// HOOK: useCountUp (animación de valor numérico)
// ═══════════════════════════════════════════════════════════
function useCountUp(target, duration = 900) {
  const [value, setValue] = React.useState(0);
  React.useEffect(() => {
    let raf, start = performance.now();
    const tick = (now) => {
      const p = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setValue(Math.round(target * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return value;
}

function Tag({ name, size = 'md', onClick, active }) {
  const c = hashToColor(name);
  const s = size === 'sm' ? { fontSize: 10, padding: '1px 6px' } : { fontSize: 11, padding: '2px 7px' };
  return (
    <span onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', gap: 3, ...s,
      fontFamily: F.mono, fontWeight: 500,
      color: c, background: active ? `${c}26` : `${c}18`,
      border: `1px solid ${c}${active?'66':'33'}`,
      borderRadius: 11, cursor: onClick ? 'pointer' : 'default',
      transition: 'all .1s',
    }}>#{name}</span>
  );
}

const STATUS_COLORS = {
  active:       T.green,      paused:     T.yellow,    archived: T.ink3,
  completed:    T.green,      running:    T.accent,    failed:   T.red,
  open:         T.yellow,     resolved:   T.green,     picked:   T.accent,
  new:          T.yellow,     triaged:    T.accent,    promoted: T.green,  discarded: T.ink3,
  delivered:    T.green,      pending:    T.yellow,    read:     T.accent2,
  healthy:      T.green,      polling:    T.yellow,    degraded: T.yellow, down: T.red,
  traced:       T.green,      fallback:   T.yellow,
  promising:    T.green,      'ready-to-promote': T.accent, iterate: T.yellow, park: T.ink3, kill: T.red,
  keep:         T.green,      'pivot-lite': T.yellow,  stop:     T.red,  adjust: T.accent2,
  advance:      T.green,
  backlog:      T.ink3,       ready:      T.accent,    progress: T.yellow, blocked: T.red, done: T.green,
  superseded:   T.ink3,       rejected:   T.red,
};

function StatusPill({ status, live = false }) {
  const c = STATUS_COLORS[status] || T.ink3;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '2px 8px', fontSize: 10, fontFamily: F.mono, fontWeight: 600,
      color: c, background: `${c}15`, border: `1px solid ${c}44`,
      borderRadius: 10, textTransform: 'uppercase', letterSpacing: 0.5,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 3, background: c, animation: live ? 'pulse 1.4s infinite' : 'none' }} />
      {status}
    </span>
  );
}

function VerdictBadge({ verdict, confidence }) {
  const c = STATUS_COLORS[verdict] || T.ink3;
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 7,
      padding: '3px 10px', borderRadius: 4,
      background: `${c}14`, border: `1px solid ${c}55`,
      fontSize: 11, fontFamily: F.mono, fontWeight: 600, color: c,
      textTransform: 'uppercase', letterSpacing: 0.8,
    }}>
      {verdict}
      {confidence != null && <span style={{ color: T.ink3, fontWeight: 500 }}>· {(confidence*100).toFixed(0)}%</span>}
    </div>
  );
}

function ProgressBar({ value, color = T.accent, delay = 0 }) {
  const [w, setW] = React.useState(0);
  React.useEffect(() => {
    const to = setTimeout(() => setW(value), delay);
    return () => clearTimeout(to);
  }, [value, delay]);
  return (
    <div style={{ height: 5, background: T.bg, borderRadius: 3, overflow: 'hidden', width: 110 }}>
      <div style={{
        height: '100%', width: `${w}%`,
        background: `linear-gradient(90deg, ${color}, ${T.accent2})`,
        borderRadius: 3, transition: 'width 1s cubic-bezier(.2,.7,.3,1)',
        boxShadow: `0 0 8px ${color}55`,
      }} />
    </div>
  );
}

}

function buildProjectGraph(projectId) {
  const p = PROJECTS.find(x => x.id === projectId);
  const nodes = [{ id: projectId, type: 'project', label: p.name, color: T.accent, meta: p }];
  const edges = [];

  RUNS.filter(r => r.project_id === projectId).slice(0, 5).forEach(r => {
    nodes.push({ id: r.id, type: 'run', label: r.agent, color: r.status === 'running' ? T.accent2 : T.green, meta: r });
    edges.push({ from: projectId, to: r.id, kind: 'produced' });
  });

  HANDOFFS.filter(h => h.project_id === projectId).forEach(h => {
    nodes.push({ id: h.id, type: 'handoff', label: h.to_actor, color: T.yellow, meta: h });
    edges.push({ from: projectId, to: h.id, kind: 'needs-review' });
  });

  DECISIONS.filter(d => d.project_id === projectId).slice(0, 4).forEach(d => {
    nodes.push({ id: d.id, type: 'decision', label: d.title, color: T.pink, meta: d });
    edges.push({ from: projectId, to: d.id, kind: 'decided' });
  });

  CANDIDATES.filter(c => c.promoted_to_project_id === projectId || c.parent_group === projectId).forEach(c => {
    nodes.push({ id: c.id, type: 'candidate', label: c.name, color: T.arrEnd, meta: c });
    edges.push({ from: projectId, to: c.id, kind: 'promoted-from' });
  });

  IDEAS.filter(i => i.promoted_to === `project:${projectId}`).forEach(i => {
    nodes.push({ id: i.id, type: 'idea', label: i.title, color: T.arrStart, meta: i });
    edges.push({ from: projectId, to: i.id, kind: 'promoted-from' });
  });

  TASKS.filter(t => t.project_id === projectId).slice(0, 6).forEach(t => {
    nodes.push({ id: t.id, type: 'task', label: t.title, color: STATUS_COLORS[t.status], meta: t });
    edges.push({ from: projectId, to: t.id, kind: 'has-task' });
  });

  return { nodes, edges };
}

function ForceGraph({ graph, onNodeClick }) {
  const W = 800, H = 480;
  const [positions, setPositions] = React.useState(() => {
    const m = {};
    graph.nodes.forEach((n, i) => {
      if (n.type === 'project') {
        m[n.id] = { x: W/2, y: H/2, vx: 0, vy: 0 };
      } else {
        const a = (i / graph.nodes.length) * Math.PI * 2;
        m[n.id] = { x: W/2 + Math.cos(a) * 180, y: H/2 + Math.sin(a) * 140, vx: 0, vy: 0 };
      }
    });
    return m;
  });
  const [hover, setHover] = React.useState(null);
  const [dragging, setDragging] = React.useState(null);
  const canvasRef = React.useRef(null);

  React.useEffect(() => {
    let raf;
    const step = () => {
      setPositions(prev => {
        const next = {};
        for (const id in prev) next[id] = { ...prev[id] };
        const cx = W/2, cy = H/2;
        const ids = Object.keys(next);
        for (let i = 0; i < ids.length; i++) {
          for (let j = i+1; j < ids.length; j++) {
            const a = next[ids[i]], b = next[ids[j]];
            const dx = b.x - a.x, dy = b.y - a.y;
            const d2 = Math.max(dx*dx + dy*dy, 25);
            const f = 4500 / d2;
            const d = Math.sqrt(d2);
            const fx = (dx/d) * f, fy = (dy/d) * f;
            a.vx -= fx; a.vy -= fy;
            b.vx += fx; b.vy += fy;
          }
        }
        for (const e of graph.edges) {
          const a = next[e.from], b = next[e.to];
          if (!a || !b) continue;
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.max(Math.sqrt(dx*dx+dy*dy), 1);
          const rest = 140;
          const k = 0.025;
          const f = (d - rest) * k;
          const fx = (dx/d)*f, fy = (dy/d)*f;
          a.vx += fx; a.vy += fy;
          b.vx -= fx; b.vy -= fy;
        }
        // anchor project-type at center
        const projectNode = graph.nodes.find(n => n.type === 'project');
        if (projectNode) {
          const p = next[projectNode.id];
          p.vx += (cx - p.x) * 0.05;
          p.vy += (cy - p.y) * 0.05;
        }
        for (const id in next) {
          const p = next[id];
          p.vx *= 0.82; p.vy *= 0.82;
          if (dragging !== id) { p.x += p.vx; p.y += p.vy; }
          p.x = Math.max(30, Math.min(W-30, p.x));
          p.y = Math.max(30, Math.min(H-30, p.y));
        }
        return next;
      });
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [dragging, graph]);

  const onMouseMove = (e) => {
    if (!dragging) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const scaleX = W / rect.width, scaleY = H / rect.height;
    setPositions(p => ({ ...p, [dragging]: { ...p[dragging], x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY, vx: 0, vy: 0 } }));
  };

  return (
    <div ref={canvasRef} onMouseMove={onMouseMove} onMouseUp={() => setDragging(null)} onMouseLeave={() => setDragging(null)}
      style={{
        position: 'relative', width: '100%', aspectRatio: `${W} / ${H}`,
        background: `radial-gradient(circle at 50% 50%, ${T.bg2} 0%, ${T.bg} 70%)`,
        border: `1px solid ${T.border}`, borderRadius: 10, overflow: 'hidden',
        cursor: dragging ? 'grabbing' : 'default',
      }}>
      <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} style={{ position: 'absolute', inset: 0, opacity: 0.15, pointerEvents: 'none' }}>
        <defs><pattern id="grid-detail" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M 30 0 L 0 0 0 30" fill="none" stroke={T.border2} strokeWidth="0.5"/></pattern></defs>
        <rect width="100%" height="100%" fill="url(#grid-detail)"/>
      </svg>
      <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
        {graph.edges.map((e, i) => {
          const a = positions[e.from], b = positions[e.to];
          if (!a || !b) return null;
          return <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
            stroke={T.border2} strokeWidth="1.3" opacity={0.7} />;
        })}
      </svg>
      {graph.nodes.map(n => {
        const p = positions[n.id];
        if (!p) return null;
        const isSel = hover === n.id;
        const isProject = n.type === 'project';
        const rad = isProject ? 22 : 10;
        const scale = isSel ? 1.15 : 1;
        return (
          <div key={n.id}
            onMouseDown={() => setDragging(n.id)}
            onMouseEnter={() => setHover(n.id)}
            onMouseLeave={() => setHover(null)}
            onClick={() => onNodeClick && onNodeClick(n)}
            style={{
              position: 'absolute',
              left: `${(p.x / W) * 100}%`, top: `${(p.y / H) * 100}%`,
              transform: `translate(-50%, -50%) scale(${scale})`,
              transition: dragging === n.id ? 'none' : 'transform .15s',
              cursor: dragging === n.id ? 'grabbing' : 'grab',
              zIndex: isSel ? 10 : isProject ? 5 : 1,
            }}>
            <div style={{
              width: rad*2, height: rad*2, borderRadius: rad,
              background: isProject ? `radial-gradient(circle, ${n.color}, ${n.color}aa)` : n.color,
              boxShadow: isSel ? `0 0 0 3px ${n.color}33, 0 0 20px ${n.color}` :
                         isProject ? `0 0 24px ${n.color}99` : `0 0 8px ${n.color}66`,
              border: `2px solid ${T.bg}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: isProject ? T.bg : 'transparent',
              fontSize: 11, fontWeight: 700, fontFamily: F.display,
            }}>{isProject ? '◈' : ''}</div>
            {(isSel || isProject) && (
              <div style={{
                position: 'absolute', left: '50%', top: `calc(100% + 6px)`, transform: 'translateX(-50%)',
                whiteSpace: 'nowrap', background: T.bg3, border: `1px solid ${T.border2}`,
                padding: '4px 9px', borderRadius: 5, fontSize: 11, fontFamily: F.body, color: T.ink,
                pointerEvents: 'none',
              }}>
                <span style={{ color: n.color, fontFamily: F.mono, fontSize: 9, textTransform: 'uppercase', letterSpacing: 1 }}>{n.type}</span>
                <span style={{ color: T.ink3 }}> · </span>
                {n.label}
              </div>
            )}
          </div>
        );
      })}
      <div style={{
        position: 'absolute', top: 10, right: 10,
        background: T.bg2, border: `1px solid ${T.border}`, borderRadius: 6,
        padding: '6px 10px', fontSize: 10, fontFamily: F.mono, color: T.ink3,
      }}>
        arrastrá los nodos · click en satélite para drill
      </div>
    </div>
  );
}

function KpiCard({ label, value, hint, color = T.accent, delay = 0, live = false }) {
  const animated = useCountUp(value, 900 + delay);
  return (
    <div style={{
      background: T.bg2, border: `1px solid ${T.border}`, borderRadius: 10,
      padding: 14, position: 'relative', overflow: 'hidden',

    }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: `radial-gradient(circle at 100% 0%, ${color}14 0%, transparent 60%)`,
        pointerEvents: 'none',
      }} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', position: 'relative' }}>
        <div style={{ fontSize: 10, color: T.ink3, textTransform: 'uppercase', letterSpacing: 1.2, fontFamily: F.mono }}>{label}</div>

      </div>
      <div style={{
        fontSize: 30, fontFamily: F.display, fontWeight: 600, margin: '8px 0 4px',

    </div>
  );
}

function WeeklyEvolutionChart({ data }) {
  const W = 520, H = 180, P = { t: 20, r: 14, b: 24, l: 28 };
  const innerW = W - P.l - P.r, innerH = H - P.t - P.b;
  const max = Math.max(...data.map(d => d.runs + d.audits + d.tasks_done)) || 1;
  const [animProgress, setAnimProgress] = React.useState(0);
  const [hover, setHover] = React.useState(null);
  React.useEffect(() => {
    let raf, start = performance.now();
    const tick = (now) => {
      const p = Math.min(1, (now - start) / 1200);
      const eased = 1 - Math.pow(1 - p, 3);
      setAnimProgress(eased);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const xFor = (i) => P.l + (i * innerW) / (data.length - 1);
  const yFor = (v) => P.t + innerH - (v / max) * innerH * animProgress;

  const pathRuns = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xFor(i)} ${yFor(d.runs)}`).join(' ');
  const pathTasks = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xFor(i)} ${yFor(d.tasks_done)}`).join(' ');
  const pathAudits = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xFor(i)} ${yFor(d.audits)}`).join(' ');

  const areaRuns = pathRuns + ` L ${xFor(data.length-1)} ${P.t + innerH} L ${P.l} ${P.t + innerH} Z`;

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: 'block' }}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={T.accent} stopOpacity="0.4"/>
            <stop offset="100%" stopColor={T.accent} stopOpacity="0"/>
          </linearGradient>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor={T.accent}/>
            <stop offset="100%" stopColor={T.accent2}/>
          </linearGradient>
        </defs>
        {/* grid lines */}
        {[0, 0.25, 0.5, 0.75, 1].map(p => (
          <line key={p} x1={P.l} y1={P.t + innerH * p} x2={W - P.r} y2={P.t + innerH * p} stroke={T.border} strokeWidth="0.6" />
        ))}
        {/* y-axis labels */}
        {[0, 0.5, 1].map(p => (
          <text key={p} x={P.l - 6} y={P.t + innerH * (1 - p) + 3} textAnchor="end" fontSize="9" fontFamily={F.mono} fill={T.ink3}>
            {Math.round(max * p)}
          </text>
        ))}
        {/* area under runs */}
        <path d={areaRuns} fill="url(#areaGrad)" />
        {/* runs line */}
        <path d={pathRuns} fill="none" stroke="url(#lineGrad)" strokeWidth="2" strokeLinejoin="round" />
        {/* tasks_done line */}
        <path d={pathTasks} fill="none" stroke={T.arrMid} strokeWidth="1.5" strokeDasharray="4 3" strokeLinejoin="round" opacity={0.8} />
        {/* audits line */}
        <path d={pathAudits} fill="none" stroke={T.pink} strokeWidth="1.5" strokeLinejoin="round" opacity={0.7} />
        {/* dots + hover zones */}
        {data.map((d, i) => (
          <g key={i}>
            <circle cx={xFor(i)} cy={yFor(d.runs)} r={hover === i ? 5 : 3.5} fill={T.accent} stroke={T.bg} strokeWidth="2" style={{ transition: 'r .15s' }} />
            <rect x={xFor(i) - 25} y={P.t} width="50" height={innerH} fill="transparent"
              onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}
              style={{ cursor: 'default' }} />
            <text x={xFor(i)} y={H - 8} textAnchor="middle" fontSize="10" fontFamily={F.mono} fill={T.ink3}>{d.date}</text>
          </g>
        ))}
      </svg>
      {hover !== null && (
        <div style={{
          position: 'absolute', left: `${(xFor(hover) / W) * 100}%`, top: 10, transform: 'translateX(-50%)',
          background: T.bg3, border: `1px solid ${T.border2}`, borderRadius: 6, padding: '6px 10px',
          fontSize: 11, fontFamily: F.mono, color: T.ink, whiteSpace: 'nowrap', pointerEvents: 'none',
          animation: 'fadeIn .1s',
        }}>
          <div style={{ color: T.ink3, marginBottom: 3, fontSize: 10 }}>{data[hover].date}</div>
          <div><span style={{ color: T.accent }}>●</span> runs: {data[hover].runs}</div>
          <div><span style={{ color: T.arrMid }}>●</span> tasks done: {data[hover].tasks_done}</div>
          <div><span style={{ color: T.pink }}>●</span> audits: {data[hover].audits}</div>
        </div>
      )}
      <div style={{ display: 'flex', gap: 14, marginTop: 4, fontSize: 10.5, fontFamily: F.mono, color: T.ink3 }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 14, height: 2, background: T.accent }}/> runs</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 14, height: 2, background: T.arrMid, borderTop: `2px dashed ${T.arrMid}` }}/> tasks done</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 14, height: 2, background: T.pink }}/> audits</span>
      </div>
    </div>
  );
}

function IdeasTreeNode({ idea, children, depth, expanded, toggle, selected, onSelect, taskCount }) {
  const has = children.length > 0;
  const isOpen = expanded.has(idea.id);
  const isSel = selected === idea.id;
  const color = idea.tags.length ? hashToColor(idea.tags[0]) : T.ink3;
  return (
    <div>
      <div onClick={() => onSelect(idea.id)} style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: `7px 10px 7px ${10 + depth * 18}px`,
        background: isSel ? `linear-gradient(90deg, ${T.bg4}, transparent)` : 'transparent',
        borderLeft: isSel ? `2px solid ${T.accent}` : '2px solid transparent',
        cursor: 'pointer', fontSize: 12.5, transition: 'all .12s',
      }}
      onMouseEnter={e => { if (!isSel) e.currentTarget.style.background = T.bg2; }}
      onMouseLeave={e => { if (!isSel) e.currentTarget.style.background = 'transparent'; }}>
        <button onClick={e => { e.stopPropagation(); if (has) toggle(idea.id); }} style={{
          background: 'none', border: 'none', color: T.ink3, padding: 0,
          width: 14, height: 14, cursor: has ? 'pointer' : 'default',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {has && <span style={{ display: 'inline-block', transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>{Icon.chevron}</span>}
        </button>
        <span style={{ width: 5, height: 5, borderRadius: 3, background: color, flexShrink: 0, boxShadow: `0 0 6px ${color}66` }} />
        <span style={{ flex: 1, color: isSel ? T.ink : T.ink2, fontWeight: isSel ? 500 : 400, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
          {idea.title}
        </span>
        <StatusPill status={idea.status} />
        {taskCount > 0 && (
          <span title={`${taskCount} tasks`} style={{
            color: T.arrMid, fontSize: 9, fontFamily: F.mono,
            background: `${T.arrMid}18`, padding: '1px 5px', borderRadius: 8,
          }}>⊕{taskCount}</span>
        )}
        {idea.cross_links?.length > 0 && (
          <span title="cross-link" style={{ color: T.pink, fontSize: 9, fontFamily: F.mono }}>↗{idea.cross_links.length}</span>
        )}
      </div>
      {isOpen && has && <div>{children}</div>}
    </div>
  );
}

function IdeasTree({ ideas, tasks, selected, onSelect }) {
  const [expanded, setExpanded] = React.useState(new Set(ideas.map(i => i.id)));
  const toggle = (id) => setExpanded(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const taskCountFor = (id) => tasks.filter(t => t.idea_id === id).length;

  const renderNode = (node, depth) => {
    const children = ideas.filter(i => i.parent_id === node.id);
    return (
      <IdeasTreeNode key={node.id} idea={node} depth={depth} expanded={expanded} toggle={toggle}
        selected={selected} onSelect={onSelect} taskCount={taskCountFor(node.id)}
        children={children.map(c => renderNode(c, depth + 1))} />
    );
  };

  const roots = ideas.filter(i => !i.parent_id);
  return <div>{roots.map(r => renderNode(r, 0))}</div>;
}

    { id: 'blocked',  label: 'Blocked',     hint: 'bloqueado',       c: T.red },
    { id: 'done',     label: 'Done',        hint: 'cerrado',         c: T.green },

              <div style={{ padding: '10px 12px', borderBottom: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ width: 8, height: 8, borderRadius: 4, background: col.c, boxShadow: `0 0 6px ${col.c}99` }} />

function StreakDots({ advances, needed }) {
  return (
    <div style={{ display: 'inline-flex', gap: 4 }}>
      {Array.from({ length: needed }).map((_, i) => (
        <span key={i} style={{
          width: 10, height: 10, borderRadius: 5,
          background: i < advances ? T.green : T.bg4,
          border: `1px solid ${i < advances ? T.green : T.border2}`,
          boxShadow: i < advances ? `0 0 6px ${T.green}99` : 'none',
          transition: 'all .3s',
        }} />
      ))}
      <span style={{ marginLeft: 6, fontFamily: F.mono, fontSize: 10.5, color: T.ink3 }}>{advances}/{needed}</span>
    </div>
  );
}

function ReadinessRing({ confidence, size = 84 }) {
  const [anim, setAnim] = React.useState(0);
  const r = size/2 - 8, c = 2 * Math.PI * r;
  React.useEffect(() => {
    let raf, start = performance.now();
    const tick = (now) => {
      const p = Math.min(1, (now - start) / 1000);
      const eased = 1 - Math.pow(1 - p, 3);
      setAnim(confidence * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [confidence]);
  const color = confidence >= 0.8 ? T.green : confidence >= 0.6 ? T.yellow : T.red;
  const dash = c * anim;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs><linearGradient id={`rg${size}`} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.8"/><stop offset="100%" stopColor={color}/></linearGradient></defs>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth="6"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`url(#rg${size})`} strokeWidth="6"
        strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={c*0.25} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}/>
      <text x={size/2} y={size/2 + 5} textAnchor="middle" fontSize={size*0.28} fontWeight="500" fill={T.ink} fontFamily={F.display}>{Math.round(anim * 100)}</text>
    </svg>
  );
}

  );
}

// ═══════════════════════════════════════════════════════════
// APP — router + shell
// ═══════════════════════════════════════════════════════════

const PAGE_META = {
  overview:      { title: 'Overview',           sub: 'Centro de mando · operación, investigación, decisiones' },
  projects:      { title: 'Projects',           sub: 'Portfolio operativo · estado vivo' },
  ideas:         { title: 'Ideas & Tasks',      sub: 'Captura → descomposición → board · inspirado en Ideathread' },
  research:      { title: 'Research',           sub: 'Candidates, queue y readiness para promover' },
  runs:          { title: 'Runs',               sub: 'Timeline de agentes · con trace Langfuse' },
  handoffs:      { title: 'Handoffs',           sub: 'Inbox operativo agrupado por actor' },
  decisions:     { title: 'Decisions',          sub: 'Timeline de ADRs · active / superseded' },
  notifications: { title: 'Notifications',      sub: 'Telegram outbound/inbound · notification_events' },
  prompts:       { title: 'Prompts & Traces',   sub: 'Catálogo Langfuse + traces recientes' },
  system:        { title: 'System',             sub: 'Health · integraciones · jobs' },
};

function App() {
  const [page, setPage] = React.useState('overview');
  const [projectDetail, setProjectDetail] = React.useState(null);
  const meta = PAGE_META[page];
  const onNewIdea = () => setPage('ideas');
  const onRunAgent = () => alert('Abriría el panel "Run agent" — endpoint POST /dashboard/actions/run-agent');
  const onOpenLangfuse = () => setPage('prompts');

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: T.bg, color: T.ink, fontFamily: F.body, fontSize: 14, display: 'flex', flexDirection: 'column' }}>
      <Header
        pageTitle={projectDetail ? `${PROJECTS.find(p => p.id === projectDetail)?.name || ''} · detalle` : meta.title}
        pageSubtitle={projectDetail ? 'Vista detallada con grafo force-directed' : meta.sub}
        onRunAgent={onRunAgent} onOpenLangfuse={onOpenLangfuse} onNewIdea={onNewIdea}
      />
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <Sidebar page={page} setPage={(p) => { setPage(p); setProjectDetail(null); }} />
        <main style={{ flex: 1, overflowY: 'auto', minWidth: 0, display: 'flex', flexDirection: 'column' }}>
          {page === 'overview'      && <OverviewPage goTo={(p) => setPage(p)} />}
          {page === 'projects' && !projectDetail && <ProjectsPage onOpen={setProjectDetail} />}
          {page === 'projects' &&  projectDetail && <ProjectDetail projectId={projectDetail} onBack={() => setProjectDetail(null)} />}
          {page === 'ideas'         && <IdeasPage />}
          {page === 'research'      && <ResearchPage />}
          {page === 'runs'          && <RunsPage />}
          {page === 'handoffs'      && <HandoffsPage />}
          {page === 'decisions'     && <DecisionsPage />}
          {page === 'notifications' && <NotificationsPage />}
          {page === 'prompts'       && <PromptsPage />}
          {page === 'system'        && <SystemPage />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
