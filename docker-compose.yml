services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ashrise_postgres_data:/var/lib/postgresql/data
      - ./:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASHRISE_TOKEN: ${ASHRISE_TOKEN:-dev-token}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ashrise
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: /workspace
      PYTHONUNBUFFERED: "1"
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace

volumes:
  ashrise_postgres_data:
