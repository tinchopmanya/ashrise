services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ashrise_postgres_data:/var/lib/postgresql/data
      - ./:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASHRISE_DOCKER: "1"
      ASHRISE_TOKEN: ${ASHRISE_TOKEN:-dev-token}
      ASHRISE_RESEARCH_PROVIDER: ${ASHRISE_RESEARCH_PROVIDER:-stub}
      ASHRISE_RESEARCH_API_KEY: ${ASHRISE_RESEARCH_API_KEY:-}
      ASHRISE_RESEARCH_BASE_URL: ${ASHRISE_RESEARCH_BASE_URL:-https://api.tavily.com}
      ASHRISE_RESEARCH_PROJECT_ID: ${ASHRISE_RESEARCH_PROJECT_ID:-}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ashrise
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      LANGFUSE_DOCKER_BASE_URL: ${LANGFUSE_DOCKER_BASE_URL:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: /workspace
      PYTHONUNBUFFERED: "1"
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace

  langfuse-postgres:
    profiles: ["observability"]
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 20

  langfuse-redis:
    profiles: ["observability"]
    image: redis:7
    command: ["redis-server", "--requirepass", "langfuse-redis-secret", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "langfuse-redis-secret", "ping"]
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - langfuse_redis_data:/data

  langfuse-clickhouse:
    profiles: ["observability"]
    image: clickhouse/clickhouse-server:24.12
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  langfuse-minio:
    profiles: ["observability"]
    image: cgr.dev/chainguard/minio
    entrypoint: sh
    command:
      - -c
      - mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 20

  langfuse-web:
    profiles: ["observability"]
    image: langfuse/langfuse:3
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment: &langfuse-env
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ashrise-langfuse-nextauth-secret
      DATABASE_URL: postgresql://postgres:postgres@langfuse-postgres:5432/langfuse
      SALT: ashrise-langfuse-salt
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: langfuse-redis-secret
      LANGFUSE_INIT_ORG_ID: ashrise-local
      LANGFUSE_INIT_ORG_NAME: Ashrise Local
      LANGFUSE_INIT_PROJECT_ID: ashrise-dev
      LANGFUSE_INIT_PROJECT_NAME: Ashrise Dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-local}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-local}
      LANGFUSE_INIT_USER_EMAIL: admin@ashrise.local
      LANGFUSE_INIT_USER_NAME: Ashrise Local Admin
      LANGFUSE_INIT_USER_PASSWORD: ashrise-local-dev
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://langfuse-web:3000/api/public/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  langfuse-worker:
    profiles: ["observability"]
    image: langfuse/langfuse-worker:3
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    environment:
      <<: *langfuse-env

volumes:
  ashrise_postgres_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
  langfuse_redis_data:
